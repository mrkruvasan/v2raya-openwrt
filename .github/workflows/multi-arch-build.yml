name: Build v2rayA feed

on:
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  build:
    name: Build packages for aarch64_cortex-a53
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Build
        uses: immortalwrt/gh-action-sdk@v7
        env:
          ARCH: aarch64_cortex-a53-openwrt-24.10
          FEEDNAME: v2raya_ci
          PACKAGES: ca-certificates v2fly-geodata v2ray-core xray-core v2raya luci-app-v2raya
          NO_REFRESH_CHECK: 1
          INDEX: 1
          KEY_BUILD: ${{ secrets.USIGN_KEY }}
          V: s

      - name: Upload feed
        uses: Pendect/action-rsyncer@9738db02560c333bf629a1533bd86ceda138e599
        with:
          flags: '-ahvHP'
          options: '--delete'
          src: 'bin/packages/aarch64_cortex-a53/v2raya_ci/'
          dest: '${{ secrets.SF_USER }}@frs.sourceforge.net:/home/frs/project/v2raya/openwrt/aarch64_cortex-a53/'
        env:
          DEPLOY_KEY: ${{ secrets.SF_KEY }}

      - name: Move created packages to project dir
        run: cp bin/packages/aarch64_cortex-a53/v2raya_ci/* . || true

      - name: Store packages
        uses: actions/upload-artifact@v5
        if: github.event_name != 'release'
        with:
          name: aarch64_cortex-a53-${{ github.sha }}-packages
          path: |
            Packages
            Packages.*
            *.ipk

      - name: Store logs
        uses: actions/upload-artifact@v5
        with:
          name: aarch64_cortex-a53-${{ github.sha }}-logs
          path: logs/

      - name: Remove logs
        run: sudo rm -rf logs/ || true
