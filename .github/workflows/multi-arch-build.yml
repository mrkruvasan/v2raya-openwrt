name: Build v2rayA feed

on:
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  build:
    name: Build packages for mediatek-filogic
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Build
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: mediatek-filogic-25.12.2
          FEEDNAME: v2raya_ci
          PACKAGES: xray-core v2raya luci-app-v2raya
          NO_REFRESH_CHECK: 1
          V: sc

      - name: Store packages
        uses: actions/upload-artifact@v5
        with:
          name: mediatek-filogic-${{ github.sha }}-packages
          path: bin/packages/mediatek-filogic/v2raya_ci/*.apk
          if-no-files-found: error

      - name: Store logs
        uses: actions/upload-artifact@v5
        with:
          name: mediatek-filogic-${{ github.sha }}-logs
          path: logs/

      - name: Remove logs
        run: sudo rm -rf logs/ || true
