name: Build v2rayA feed

on:
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  build:
    name: Build packages for aarch64_cortex-a53
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Скачиваем OpenWrt SDK
      - name: Download OpenWrt SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/24.10.6/targets/mediatek/filogic/openwrt-sdk-24.10.6-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          wget $SDK_URL -O sdk.tar.zst
          tar --use-compress-program=unzstd -xf sdk.tar.zst
          mv openwrt-sdk-* sdk

      # 2️⃣ Настраиваем PATH и проверяем Go
      - name: Setup Go from SDK
        run: |
          export PATH="$PWD/sdk/staging_dir/toolchain-aarch64_cortex-a53_gcc-13.3.0_musl/bin:$PATH"
          go version

      # 3️⃣ Добавляем feed v2raya_ci
      - name: Add v2raya feed
        run: |
          mkdir -p sdk/feeds
          cp -r ./feeds/v2raya_ci sdk/feeds/v2raya_ci
          echo "src-link v2raya_ci ./feeds/v2raya_ci" >> sdk/feeds.conf.default

      # 4️⃣ Обновляем feeds
      - name: Update feeds
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 5️⃣ Сборка пакетов
      - name: Build packages
        run: |
          cd sdk
          make package/ca-certificates/compile V=s
          make package/v2fly-geodata/compile V=s
          make package/v2ray-core/compile V=s
          make package/xray-core/compile V=s
          make package/v2raya/compile V=s
          make package/luci-app-v2raya/compile V=s

      # 6️⃣ Загружаем готовые ipk
      - name: Store packages
        uses: actions/upload-artifact@v5
        with:
          name: aarch64_cortex-a53-${{ github.sha }}-packages
          path: sdk/bin/packages/aarch64_cortex-a53/v2raya_ci/*.ipk

      # 7️⃣ Сохраняем логи сборки
      - name: Store logs
        uses: actions/upload-artifact@v5
        with:
          name: aarch64_cortex-a53-${{ github.sha }}-logs
          path: sdk/logs/

      # 8️⃣ Удаляем логи после хранения
      - name: Remove logs
        run: sudo rm -rf sdk/logs/ || true