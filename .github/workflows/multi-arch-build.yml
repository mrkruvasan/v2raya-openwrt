name: Build v2rayA feed

on:
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  build:
    name: Build packages for aarch64_cortex-a53
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Build
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: aarch64_cortex-a53-openwrt-24.10.6
          FEEDNAME: v2raya_ci
          PACKAGES: ca-certificates v2fly-geodata v2ray-core xray-core v2raya luci-app-v2raya
          NO_REFRESH_CHECK: 1
          V: s

      - name: Store packages
        uses: actions/upload-artifact@v5
        with:
          name: aarch64_cortex-a53-${{ github.sha }}-packages
          path: bin/packages/aarch64_cortex-a53/v2raya_ci/*.ipk

      - name: Store logs
        uses: actions/upload-artifact@v5
        with:
          name: aarch64_cortex-a53-${{ github.sha }}-logs
          path: logs/

      - name: Remove logs
        run: sudo rm -rf logs/ || true