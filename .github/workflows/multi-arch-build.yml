name: Build v2rayA feed

on:
  workflow_dispatch:
  push:
    tags:
      - 'ax3000t-*'

env:
  OPENWRT_VERSION: 24.10.6
  OPENWRT_TARGET: mediatek
  OPENWRT_SUBTARGET: filogic
  PACKAGE_NAMES: xray-core v2raya luci-app-v2raya ca-certificates

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            flex \
            g++ \
            gawk \
            gcc-multilib \
            gettext \
            git \
            libncurses5-dev \
            libssl-dev \
            python3 \
            python3-distutils \
            rsync \
            unzip \
            zlib1g-dev \
            file \
            wget \
            xsltproc \
            zstd \
            ccache \
            curl

      - name: Download OpenWrt SDK
        env:
          SDK_BASE_URL: https://downloads.openwrt.org/releases/${{ env.OPENWRT_VERSION }}/targets/${{ env.OPENWRT_TARGET }}/${{ env.OPENWRT_SUBTARGET }}
          SDK_PATTERN: -sdk-${{ env.OPENWRT_VERSION }}-${{ env.OPENWRT_TARGET }}-${{ env.OPENWRT_SUBTARGET }}
        run: |
          set -euxo pipefail

          mkdir -p $HOME/sdk
          cd $HOME/sdk

          wget -q $SDK_BASE_URL/sha256sums

          SDK_FILE=$(grep "$SDK_PATTERN" sha256sums | awk '{print $2}' | sed 's/\*//g' | head -n1)

          wget -q $SDK_BASE_URL/$SDK_FILE

          grep "$SDK_FILE" sha256sums > sha256sums.sdk
          sha256sum -c sha256sums.sdk

          mkdir -p $HOME/openwrt-sdk

          case "$SDK_FILE" in
            *.tar.zst)
              tar --zstd -xf $SDK_FILE -C $HOME/openwrt-sdk --strip=1
              ;;
            *.tar.xz)
              tar -xf $SDK_FILE -C $HOME/openwrt-sdk --strip=1
              ;;
          esac

      - name: Configure feeds and add custom feed
        run: |
          set -euxo pipefail
          cd $HOME/openwrt-sdk

          cp feeds.conf.default feeds.conf

          sed -i 's#git.openwrt.org/openwrt/openwrt#github.com/openwrt/openwrt#' feeds.conf
          sed -i 's#git.openwrt.org/feed/packages#github.com/openwrt/packages#' feeds.conf
          sed -i 's#git.openwrt.org/project/luci#github.com/openwrt/luci#' feeds.conf
          sed -i 's#git.openwrt.org/feed/telephony#github.com/openwrt/telephony#' feeds.conf

          echo "src-link custom $GITHUB_WORKSPACE" >> feeds.conf

          ./scripts/feeds update -a
          ./scripts/feeds install -a

          ./scripts/feeds install -p custom \
            xray-core \
            v2raya \
            luci-app-v2raya \
            ca-certificates

      - name: Build packages
        run: |
          set -euxo pipefail
          cd $HOME/openwrt-sdk

          make defconfig

          for pkg in ${{ env.PACKAGE_NAMES }}; do
            make package/$pkg/clean
            make package/$pkg/compile -j$(nproc) V=s
          done

      - name: Collect IPK files
        run: |
          set -euxo pipefail

          mkdir -p dist

          find $HOME/openwrt-sdk/bin/packages -name "*.ipk" \
            -exec cp {} dist/ \;

          ls -lh dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ env.OPENWRT_VERSION }}-packages
          path: dist/*.ipk
          if-no-files-found: error

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/ax3000t-')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.ipk
