name: Build v2rayA feed

on:
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  build:
    name: Build packages for aarch64_cortex-a53
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Проверяем код
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # 2️⃣ Скачиваем правильный SDK для mediatek/filogic
      - name: Download OpenWrt SDK
        run: |
          wget -O openwrt-sdk.tar.zst https://downloads.openwrt.org/releases/24.10.6/targets/mediatek/filogic/openwrt-sdk-24.10.6-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          tar -xf openwrt-sdk.tar.zst
          mv openwrt-sdk-24.10.6-mediatek-filogic sdk

      # 3️⃣ Сборка пакетов через make
      - name: Build packages
        run: |
          cd sdk
          # Обновляем feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          # Сборка пакетов
          make package/ca-certificates/{compile,package} V=s
          make package/v2fly-geodata/{compile,package} V=s
          make package/v2ray-core/{compile,package} V=s
          make package/xray-core/{compile,package} V=s
          make package/v2raya/{compile,package} V=s
          make package/luci-app-v2raya/{compile,package} V=s

      # 4️⃣ Загружаем готовые ipk
      - name: Store packages
        uses: actions/upload-artifact@v5
        with:
          name: aarch64_cortex-a53-${{ github.sha }}-packages
          path: sdk/bin/packages/aarch64_cortex-a53/v2raya_ci/*.ipk
          if-no-files-found: error

      # 5️⃣ Загружаем логи
      - name: Store logs
        uses: actions/upload-artifact@v5
        with:
          name: aarch64_cortex-a53-${{ github.sha }}-logs
          path: sdk/logs/

      # 6️⃣ Убираем временные логи
      - name: Remove logs
        run: rm -rf sdk/logs/ || true