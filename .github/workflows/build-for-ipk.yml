name: Build v2rayA for ipk/apk

on:
  workflow_dispatch:
    inputs:
      arch:
        description: "Select OpenWrt SDK version"
        required: true
        type: choice
        options:
          - mediatek-filogic-24.10.6 (ipk)
          - mediatek-filogic-25.12.2 (apk)
        default: mediatek-filogic-24.10.6 (ipk)

jobs:
  build:
    name: Build OpenWrt packages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Prepare ARCH value
        run: |
          ARCH_VALUE="${{ inputs.arch }}"
          ARCH_VALUE=$(echo "$ARCH_VALUE" | sed 's/ (ipk)//' | sed 's/ (apk)//')
          echo "ARCH=$ARCH_VALUE" >> $GITHUB_ENV

      - name: Build packages
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ env.ARCH }}
          FEEDNAME: v2raya_ci
          PACKAGES: ca-certificates luci-app-v2raya v2raya xray-core
          NO_REFRESH_CHECK: 1
          V: sc

      - name: Detect package format
        run: |
          echo "Checking package format..."

          if find bin/packages -name "*.ipk" | grep -q .; then
            FORMAT="ipk"
          elif find bin/packages -name "*.apk" | grep -q .; then
            FORMAT="apk"
          else
            echo "No packages built"
            exit 1
          fi

          echo "PACKAGE_FORMAT=$FORMAT" >> $GITHUB_ENV
          echo "Detected package format: $FORMAT"

      - name: Store packages
        uses: actions/upload-artifact@v5
        with:
          name: packages-${{ env.PACKAGE_FORMAT }}-${{ env.ARCH }}-${{ github.sha }}
          path: |
            bin/packages/**/*.ipk
            bin/packages/**/*.apk
          if-no-files-found: ignore